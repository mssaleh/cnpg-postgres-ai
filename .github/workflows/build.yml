name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.dockerignore'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      pgvector_version:
        description: "Pin pgvector version (blank = latest in PGDG)"
        required: false
        default: ""
      postgis_version:
        description: "Pin PostGIS version (blank = latest in PGDG)"
        required: false
        default: ""
      timescaledb_version:
        description: "Pin TimescaleDB version (blank = latest in Timescale apt)"
        required: false
        default: ""
      pgvectorscale_version:
        description: "Pin pgvectorscale tag (blank = latest GH release)"
        required: false
        default: ""
      age_version:
        description: "Pin Apache AGE version (blank = latest PG18; format: 1.7.0)"
        required: false
        default: ""
  # Weekly rebuild for security patches in the base image + extensions.
  # Sunday 02:00 UTC = early Monday in Asia/Dubai (low-traffic window).
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read
  packages: write
  id-token: write   # for cosign keyless signing (future)

env:
  GHCR_REGISTRY: ghcr.io
  HARBOR_REGISTRY: harbor.cluster.nxu.ae
  HARBOR_PROJECT: library
  IMAGE_NAME: ${{ github.repository }}     # e.g. mssaleh/cnpg-postgres-ai

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR — uses the built-in GITHUB_TOKEN.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Harbor — uses a project-scoped robot account.
      # docker/login-action mysteriously fails with "unauthorized" against
      # this Harbor (curl-based auth from the same runner works fine —
      # /v2/ returns proper WWW-Authenticate, /service/token returns 200
      # with a valid bearer token). Workaround: log in directly via the
      # docker CLI piping the password through stdin. buildx (via
      # build-push-action below) reads ~/.docker/config.json so the auth
      # propagates correctly to the push step.
      - name: Verify Harbor secret values reach the workflow
        run: |
          echo "USERNAME len: ${#HARBOR_USERNAME}"
          echo "PASSWORD len: ${#HARBOR_PASSWORD}"
          echo "USERNAME first 5 chars: '${HARBOR_USERNAME:0:5}'"
          # Print sha256 sum so we can compare to what we expect locally
          echo "USERNAME sha256: $(printf '%s' "${HARBOR_USERNAME}" | sha256sum | head -c 16)"
          echo "PASSWORD sha256: $(printf '%s' "${HARBOR_PASSWORD}" | sha256sum | head -c 16)"
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      - name: Login to Harbor (manual docker CLI)
        run: |
          echo "${HARBOR_PASSWORD}" | docker login "${HARBOR_REGISTRY}" \
            --username "${HARBOR_USERNAME}" --password-stdin
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      # Compute tags:
      #   - 18-latest          : floating, always newest weekly build
      #   - 18-YYYY-MM-DD-<sha>: immutable, for production CNPG Cluster CRs
      # Tag list includes both GHCR + Harbor — build-push-action pushes
      # to all listed registries in a single buildx run.
      - id: meta
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          SHA=$(git rev-parse --short HEAD)
          # Extract just the image base name (drop the org prefix)
          IMG_BASE=$(echo "${IMAGE_NAME}" | awk -F/ '{print $NF}')

          {
            echo "tags<<EOF"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-latest"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-${DATE}-${SHA}"
            echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMG_BASE}:18-latest"
            echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMG_BASE}:18-${DATE}-${SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "img_base=${IMG_BASE}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 only for now — c1 nodes are all x86_64 NUCs / Dell. Add
          # arm64 to the platforms list if/when we run on ARM hardware.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          # Pass-through optional pins from workflow_dispatch inputs.
          # All blank by default → image floats to latest.
          build-args: |
            PGVECTOR_VERSION=${{ inputs.pgvector_version }}
            POSTGIS_VERSION=${{ inputs.postgis_version }}
            TIMESCALEDB_VERSION=${{ inputs.timescaledb_version }}
            PGVECTORSCALE_VERSION=${{ inputs.pgvectorscale_version }}
            AGE_VERSION=${{ inputs.age_version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Parity smoke test: bootstrap postgres ourselves (the CNPG image
      # strips docker-entrypoint.sh because the operator drives lifecycle),
      # then CREATE EXTENSION all five and print resulting versions. Build
      # fails if any extension is missing or fails to load. AGE also gets
      # a basic graph round-trip to verify the cypher() function works.
      - name: Parity check
        run: |
          set -euxo pipefail
          IMG="${GHCR_REGISTRY}/${IMAGE_NAME}:18-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}"
          docker pull "${IMG}"

          docker run -d --name pg-parity \
            --entrypoint bash \
            "${IMG}" -c '
              set -e
              export PATH=/usr/lib/postgresql/18/bin:$PATH PGDATA=/tmp/pgdata
              mkdir -p "$PGDATA" && chmod 700 "$PGDATA"
              initdb -D "$PGDATA" --auth=trust --username=postgres >/dev/null
              echo "shared_preload_libraries = '"'"'timescaledb,age'"'"'" >> "$PGDATA/postgresql.conf"
              echo "listen_addresses = '"'"'*'"'"'" >> "$PGDATA/postgresql.conf"
              exec postgres -D "$PGDATA"
            '

          for i in $(seq 1 30); do
            if docker exec pg-parity bash -c '/usr/lib/postgresql/18/bin/pg_isready -h localhost -U postgres' >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          # Step 1 — all 5 extensions install + versions
          docker exec pg-parity bash -c '
            /usr/lib/postgresql/18/bin/psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "
              CREATE EXTENSION vector;
              CREATE EXTENSION vectorscale CASCADE;
              CREATE EXTENSION postgis;
              CREATE EXTENSION timescaledb;
              CREATE EXTENSION age;
              SELECT extname, extversion FROM pg_extension
                WHERE extname IN ('"'"'vector'"'"','"'"'vectorscale'"'"','"'"'postgis'"'"','"'"'timescaledb'"'"','"'"'age'"'"')
                ORDER BY extname;
            "
          '

          # Step 2 — AGE round-trip: create graph + run a Cypher query.
          # Validates openCypher parser + agtype + cypher() function.
          docker exec pg-parity bash -c '
            /usr/lib/postgresql/18/bin/psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "
              LOAD '"'"'age'"'"';
              SET search_path = ag_catalog, \"\$user\", public;
              SELECT create_graph('"'"'parity'"'"');
              SELECT * FROM cypher('"'"'parity'"'"', \$\$
                CREATE (a:Node {n: 1})-[:LINK]->(b:Node {n: 2}) RETURN a, b
              \$\$) AS (a agtype, b agtype);
              SELECT * FROM cypher('"'"'parity'"'"', \$\$
                MATCH (x:Node) RETURN count(x)
              \$\$) AS (c agtype);
              SELECT drop_graph('"'"'parity'"'"', true);
            "
          '

          docker logs --tail 60 pg-parity || true
          docker rm -f pg-parity

      - name: Summary
        run: |
          {
            echo "## Image published"
            echo ""
            echo "**GHCR (public):**"
            echo "\`\`\`"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-latest"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}"
            echo "\`\`\`"
            echo ""
            echo "**Harbor (internal mirror):**"
            echo "\`\`\`"
            echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${{ steps.meta.outputs.img_base }}:18-latest"
            echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${{ steps.meta.outputs.img_base }}:18-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}"
            echo "\`\`\`"
            echo ""
            echo "**Date:** ${{ steps.meta.outputs.date }}"
            echo "**Git SHA:** ${{ steps.meta.outputs.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
