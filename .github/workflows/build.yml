name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.dockerignore'
  workflow_dispatch:
    inputs:
      pgvector_version:
        description: "Pin pgvector version (blank = latest in PGDG)"
        required: false
        default: ""
      postgis_version:
        description: "Pin PostGIS version (blank = latest in PGDG)"
        required: false
        default: ""
      timescaledb_version:
        description: "Pin TimescaleDB version (blank = latest in Timescale apt)"
        required: false
        default: ""
      pgvectorscale_version:
        description: "Pin pgvectorscale tag (blank = latest GH release)"
        required: false
        default: ""
      age_version:
        description: "Pin Apache AGE version (blank = latest PG18; format: 1.7.0)"
        required: false
        default: ""
  # Weekly rebuild for security patches in the base image + extensions.
  # Sunday 02:00 UTC = early Monday in Asia/Dubai (low-traffic window).
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read
  packages: write
  id-token: write   # for cosign keyless signing (future)

env:
  GHCR_REGISTRY: ghcr.io
  HARBOR_REGISTRY: harbor.cluster.nxu.ae
  HARBOR_PROJECT: library
  IMAGE_NAME: ${{ github.repository }}     # e.g. mssaleh/cnpg-postgres-ai

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Local CI preflight
        run: ./scripts/local-ci.sh "cnpg-postgres-ai:ci-${{ github.run_id }}"
        env:
          CACHE_BUST: ${{ github.run_id }}
          PGVECTOR_VERSION: ${{ inputs.pgvector_version }}
          POSTGIS_VERSION: ${{ inputs.postgis_version }}
          TIMESCALEDB_VERSION: ${{ inputs.timescaledb_version }}
          PGVECTORSCALE_VERSION: ${{ inputs.pgvectorscale_version }}
          AGE_VERSION: ${{ inputs.age_version }}

      # GHCR — uses the built-in GITHUB_TOKEN.
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Harbor is an internal mirror and may be offline when the c1 cluster
      # is powered down. Treat it as best-effort: GHCR is enough for a
      # successful build, and Harbor gets mirrored when reachable.
      - id: harbor
        name: Login to Harbor (best effort)
        run: |
          set +e
          if [ -z "${HARBOR_USERNAME}" ] || [ -z "${HARBOR_PASSWORD}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Harbor credentials are not configured; skipping Harbor mirror"
            exit 0
          fi

          echo "${HARBOR_PASSWORD}" | timeout 30 docker login "${HARBOR_REGISTRY}" \
            --username "${HARBOR_USERNAME}" --password-stdin
          status=$?
          if [ "${status}" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Harbor unavailable or login failed with status ${status}; GHCR publish will continue"
          fi
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      # Compute tags:
      #   - 18-latest          : floating, always newest weekly build
      #   - 18-YYYY-MM-DD-<sha>: immutable, for production CNPG Cluster CRs
      # GHCR is the required public publish target. Harbor tags are computed
      # separately and mirrored only when Harbor is reachable.
      - id: meta
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          SHA=$(git rev-parse --short HEAD)
          # Extract just the image base name (drop the org prefix)
          IMG_BASE=$(echo "${IMAGE_NAME}" | awk -F/ '{print $NF}')

          {
            echo "ghcr_tags<<EOF"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-latest"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-${DATE}-${SHA}"
            echo "EOF"
            echo "harbor_tags<<EOF"
            echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMG_BASE}:18-latest"
            echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMG_BASE}:18-${DATE}-${SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "img_base=${IMG_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${GHCR_REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "harbor_latest=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMG_BASE}:18-latest" >> "$GITHUB_OUTPUT"
          echo "harbor_immutable=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMG_BASE}:18-${DATE}-${SHA}" >> "$GITHUB_OUTPUT"

      - id: build_ghcr
        name: Build and push image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          pull: true
          # amd64 only for now — c1 nodes are all x86_64 NUCs / Dell. Add
          # arm64 to the platforms list if/when we run on ARM hardware.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.ghcr_tags }}
          # Pass-through optional pins from workflow_dispatch inputs.
          # All blank by default → image floats to latest.
          build-args: |
            CACHE_BUST=${{ github.run_id }}
            PGVECTOR_VERSION=${{ inputs.pgvector_version }}
            POSTGIS_VERSION=${{ inputs.postgis_version }}
            TIMESCALEDB_VERSION=${{ inputs.timescaledb_version }}
            PGVECTORSCALE_VERSION=${{ inputs.pgvectorscale_version }}
            AGE_VERSION=${{ inputs.age_version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: mirror_harbor
        name: Mirror image to Harbor (best effort)
        if: steps.harbor.outputs.available == 'true'
        continue-on-error: true
        env:
          DIGEST: ${{ steps.build_ghcr.outputs.digest }}
          GHCR_IMAGE: ${{ steps.meta.outputs.ghcr_image }}
          HARBOR_LATEST: ${{ steps.meta.outputs.harbor_latest }}
          HARBOR_IMMUTABLE: ${{ steps.meta.outputs.harbor_immutable }}
        run: |
          set -euxo pipefail
          docker buildx imagetools create \
            --tag "${HARBOR_LATEST}" \
            --tag "${HARBOR_IMMUTABLE}" \
            "${GHCR_IMAGE}@${DIGEST}"

      # Sigstore keyless signing — uses GitHub's OIDC token to mint a
      # short-lived certificate from Fulcio (no long-lived keypair). GHCR
      # signatures are required. Harbor signatures are best-effort, matching
      # the optional mirror.
      #
      # `--yes` accepts the Sigstore transparency-log inclusion prompt
      # (the public Rekor log records each signature for audit). For an
      # air-gapped equivalent, generate a long-lived cosign keypair and
      # use `cosign sign --key cosign.key` instead — but keyless is
      # simpler in CI and rotates the cert per build.
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign GHCR image
        env:
          DIGEST: ${{ steps.build_ghcr.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.ghcr_tags }}
          COSIGN_YES: "true"
        run: |
          set -euxo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "ERROR: build digest not exported by build-push-action" >&2
            exit 1
          fi
          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "Signing ${tag}@${DIGEST}"
            cosign sign "${tag}@${DIGEST}"
          done <<< "${TAGS}"

      - id: sign_harbor
        name: Sign Harbor image (best effort)
        if: steps.mirror_harbor.outcome == 'success'
        continue-on-error: true
        env:
          DIGEST: ${{ steps.build_ghcr.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.harbor_tags }}
          COSIGN_YES: "true"
        run: |
          set -euxo pipefail
          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "Signing ${tag}@${DIGEST}"
            cosign sign "${tag}@${DIGEST}"
          done <<< "${TAGS}"

      # Parity smoke test: bootstrap postgres ourselves (the CNPG image
      # strips docker-entrypoint.sh because the operator drives lifecycle),
      # then CREATE EXTENSION all five and print resulting versions. Build
      # fails if any extension is missing or fails to load. AGE also gets
      # a basic graph round-trip to verify the cypher() function works.
      - name: Parity check
        run: ./scripts/parity-check.sh "${GHCR_REGISTRY}/${IMAGE_NAME}:18-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}"

      - name: Summary
        env:
          HARBOR_AVAILABLE: ${{ steps.harbor.outputs.available }}
          HARBOR_MIRROR_OUTCOME: ${{ steps.mirror_harbor.outcome }}
          HARBOR_SIGN_OUTCOME: ${{ steps.sign_harbor.outcome }}
        run: |
          {
            echo "## Image published"
            echo ""
            echo "**GHCR (public):**"
            echo "\`\`\`"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-latest"
            echo "${GHCR_REGISTRY}/${IMAGE_NAME}:18-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}"
            echo "\`\`\`"
            echo ""
            if [ "${HARBOR_AVAILABLE}" = "true" ] && [ "${HARBOR_MIRROR_OUTCOME}" = "success" ]; then
              echo "**Harbor (internal mirror, best effort):**"
              echo "\`\`\`"
              echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${{ steps.meta.outputs.img_base }}:18-latest"
              echo "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${{ steps.meta.outputs.img_base }}:18-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}"
              echo "\`\`\`"
              echo "Harbor signature status: ${HARBOR_SIGN_OUTCOME:-skipped}"
            else
              echo "**Harbor (internal mirror):** skipped (${HARBOR_MIRROR_OUTCOME:-unavailable})"
            fi
            echo ""
            echo "**Date:** ${{ steps.meta.outputs.date }}"
            echo "**Git SHA:** ${{ steps.meta.outputs.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
